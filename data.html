<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>uFeedMe | Sugestões</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Anonymous+Pro&family=Gruppo&display=swap" rel="stylesheet">
  <link rel="shortcut icon" href="Images/alvo.png">  <style>
    header {
      text-align: center;
      font-size: 1.8rem;
      margin-bottom: 30px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
    }

    main {
      width: 100%;
      max-width: 500px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    input[type="email"],
    textarea {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 15px;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      font-size: 1.1rem;
    }

    input::placeholder,
    textarea::placeholder {
      color: #ddd;
    }

    textarea {
      resize: none;
      height: 150px;
    }

    button {
      padding: 10px 30px;
      font-size: 1rem;
      background: transparent;
      border: 2px solid white;
      border-radius: 15px;
      color: white;
      cursor: pointer;
      transition: 0.3s ease;
    }

    button:hover {
      background-color: rgba(255, 255, 255, 0.2);
    }
  </style>
</head>
<body>
  <header>
    Caso Queira, Fique por Dentro das Novidades!
  </header>
  <main>
    <form action="responses.html" method="GET">
      <input type="email" name="email" placeholder="E-mail" required>
      <textarea name="sugestao" placeholder="Deixe uma sugestão..." required></textarea>
      <button type="submit">ENVIAR</button>
    </form>
  </main>
</body>
</html>
